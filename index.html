<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Digital Premium</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link id="font-link" href="" rel="stylesheet">

<style>
/* ── VARIABLES DE DISEÑO ── */
:root {
  --bg-1: #ffffff;
  --bg-2: #f9f9f9;
  --accent: #C9A98C;
  --accent-dark: #A68A6E; /* Para el efecto 3D */
  --title-color: #2E2822;
  --text-color: #8C7B6E;
  --title-font: 'Cormorant Garamond', serif;
  --body-font: 'Jost', sans-serif;
  --title-size: 3.5rem;
  --title-lh: 1.0; 
  --text-size: 1.1rem;
  --section-spacing: 7rem;
}

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { 
    background-color: var(--bg-1); color: var(--text-color); 
    font-family: var(--body-font); line-height: 1.7; text-align: center;
}

/* ── ANIMACIONES DE ICONOS ── */
@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
}
@keyframes drawPath {
    from { stroke-dashoffset: 100; opacity: 0; }
    to { stroke-dashoffset: 0; opacity: 1; }
}
.icon-wrapper { 
    width: 60px; height: 60px; margin: 0 auto 1.5rem; color: var(--accent);
    animation: float 4s ease-in-out infinite;
}
.icon-wrapper svg {
    width: 100%; height: 100%; stroke-dasharray: 100; stroke-dashoffset: 100;
}
.visible .icon-wrapper svg { animation: drawPath 2.5s ease-out forwards; }

/* ── PORTADA ── */
#cover {
  position: relative; height: 100vh; display: flex; 
  align-items: center; justify-content: center; overflow: hidden; color: white;
}
#cover-bg {
  position: absolute; inset: 0; background-size: cover; background-position: center;
  transform: scale(1.05);
}
#cover-overlay {
  position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.5));
}
#cover-content { position: relative; z-index: 2; padding: 20px; }
#cover h1 { font-family: var(--title-font); font-size: clamp(3rem, 12vw, 6rem); font-weight: 300; }

/* ── SECCIONES ── */
.section-wrapper {
    padding: var(--section-spacing) 1.5rem;
    opacity: 0; transform: translateY(30px);
    transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
}
.section-wrapper.visible { opacity: 1; transform: translateY(0); }
.section-wrapper:nth-child(odd) { background-color: var(--bg-1); }
.section-wrapper:nth-child(even) { background-color: var(--bg-2); }
.container { max-width: 800px; width: 100%; margin: 0 auto; }
h2 { font-family: var(--title-font); font-size: var(--title-size); color: var(--title-color); line-height: var(--title-lh); margin-bottom: 2rem; }

/* ── BOTONES 3D MEJORADOS ── */
.btn {
    display: inline-block; position: relative;
    padding: 1.2rem 2.8rem; margin-top: 1.5rem;
    background: var(--bg-1);
    color: var(--accent);
    border: 2px solid var(--accent);
    border-radius: 8px;
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
    text-decoration: none; cursor: pointer;
    transition: all 0.2s ease;
    /* Efecto Sombra 3D */
    box-shadow: 0 5px 0 var(--accent);
    top: 0;
}
.btn:hover {
    top: -2px;
    box-shadow: 0 7px 0 var(--accent);
    background: var(--bg-2);
}
.btn:active {
    top: 4px;
    box-shadow: 0 1px 0 var(--accent);
}

/* Botón WhatsApp 3D */
.btn-wa {
    background: #25D366; color: white; border-color: #1eb954;
    box-shadow: 0 5px 0 #128C7E;
}
.btn-wa:hover { background: #26e06d; box-shadow: 0 7px 0 #128C7E; color: white; }
.btn-wa:active { box-shadow: 0 1px 0 #128C7E; }

/* ── EVENTOS ── */
.event-box { margin-bottom: 4rem; }
.event-title { font-family: var(--title-font); font-size: 2.2rem; color: var(--accent); margin-bottom: 1rem; text-transform: uppercase; }
.event-info { font-size: 1.1rem; margin-bottom: 0.5rem; }
.event-info strong { color: var(--title-color); display: block; text-transform: uppercase; font-size: 0.8rem; margin-top: 10px; }

/* ── GALERÍA ── */
.gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 3rem; }
.gallery-item { overflow: hidden; aspect-ratio: 1/1; cursor: pointer; border-radius: 4px; opacity: 0; transform: scale(0.9); transition: 0.8s all ease; }
.visible .gallery-item { opacity: 1; transform: scale(1); }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
.gallery-item:hover img { transform: scale(1.1); }

/* ── CIERRE FINAL ── */
#cierre-final { padding-bottom: 5rem; }
.final-message { font-family: var(--title-font); font-size: 2.8rem; color: var(--title-color); font-weight: 300; margin-top: 2rem; }
.ornament { width: 160px; margin: 2rem auto; color: var(--accent); }

/* ── LIGHTBOX & MODAL ── */
#lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; }
#lightbox img { max-width: 90%; max-height: 85%; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; }
.modal-content { background: var(--bg-1); padding: 3rem; border-radius: 12px; max-width: 500px; width: 90%; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

.countdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 2rem; }
.cd-num { display: block; font-family: var(--title-font); font-size: 2.5rem; color: var(--accent); }

@media (max-width: 600px) {
    :root { --title-size: 2.6rem; --section-spacing: 4.5rem; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div id="cover">
    <div id="cover-bg"></div>
    <div id="cover-overlay"></div>
    <div id="cover-content">
        <span class="eyebrow" id="t-eyebrow"></span>
        <h1 id="t-names"></h1>
        <p id="t-cover-date" style="color:white; letter-spacing:3px; text-transform:uppercase; font-size:0.8rem;"></p>
    </div>
</div>

<div id="main-content"></div>

<!-- Mensaje de Cierre (Fuera del loop para que sea lo último) -->
<div id="cierre-final" class="section-wrapper">
    <div class="container">
        <div id="final-text-container"></div>
        <div class="ornament" id="ornament-container"></div>
    </div>
</div>

<div id="gift-modal" class="modal" onclick="if(event.target==this) closeGiftModal()">
    <div class="modal-content">
        <h2 style="font-size: 1.8rem; margin-bottom: 1rem;">Datos Bancarios</h2>
        <div id="bank-details" style="line-height: 2;"></div>
        <button class="btn" onclick="closeGiftModal()">Cerrar</button>
    </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
    <img src="" alt="" onclick="event.stopPropagation()">
</div>

<script>
/* ════════════════════════════════════════
   ★ CONFIGURACIÓN FÁCIL
═════════════════════════════════════════= */

const CONFIG = {
    paletaElegida: 1, 
    eventos: {
        ceremonia: { titulo: "Ceremonia", fecha: "20 de Diciembre, 2026", hora: "18:00 Hs", lugar: "Parroquia San José", direccion: "Calle de la Fe 123", linkMapa: "#" },
        fiesta: { titulo: "Fiesta", fecha: "20 de Diciembre, 2026", hora: "21:00 Hs", lugar: "Salón Jardines", direccion: "Av. Principal 456", linkMapa: "#" }
    },
    rsvp: {
        titulo: "Confirmación",
        texto: "Tu presencia es nuestro mejor regalo. Por favor, confírmanos tu asistencia.",
        whatsapp: "59899000000",
        mensaje: "¡Hola! Confirmo mi asistencia a la boda."
    },
    regalos: {
        titulo: "Mesa de Regalos",
        texto: "Si deseas hacernos un presente, puedes realizarlo a través de nuestra cuenta bancaria.",
        banco: "Banco Santander", titular: "Sofía & Martín", cuenta: "CBU: 000001234567890123", ci: "C.I. 1.234.567-8"
    },
    cierre: {
        mensaje: "¡Te esperamos!",
        subtexto: "No sería lo mismo sin ti.",
        tipoOrnamento: "floral" 
    },
    global: {
        nombres: "Sofía & Martín",
        frasePortada: "¡Nos Casamos!",
        fechaPortada: "20 . 12 . 2026",
        fechaCuentaRegresiva: new Date(2026, 11, 20, 18, 0),
        fotoPortada: "cover.jpg",
        fuente: "A"
    },
    fotosGaleria: ["foto1.jpg", "foto2.jpg", "foto3.jpg", "foto4.jpg", "foto5.jpg", "foto6.jpg", "foto7.jpg", "foto8.jpg", "foto9.jpg", "foto10.jpg"]
};

/* ════════════════════════════════════════
   MOTOR LOGICO
═════════════════════════════════════════= */

const ORNAMENTOS = {
    floral: `<svg viewBox="0 0 100 40" fill="none" stroke="currentColor" stroke-width="0.5"><path d="M10 20 Q25 10 40 20 T70 20 T90 20"/><path d="M30 15 Q35 5 40 15"/><path d="M60 15 Q65 5 70 15"/><circle cx="50" cy="20" r="1.5"/></svg>`,
    minimal: `<svg viewBox="0 0 100 20" stroke="currentColor" stroke-width="0.5"><line x1="0" y1="10" x2="40" y2="10"/><circle cx="50" cy="10" r="2" fill="none"/><line x1="60" y1="10" x2="100" y2="10"/></svg>`,
    clasico: `<svg viewBox="0 0 100 30" fill="none" stroke="currentColor" stroke-width="0.5"><path d="M0 15 C20 5 30 25 50 15 C70 5 80 25 100 15"/></svg>`
};

const ICONOS = {
    heart: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`,
    calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`,
    map: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
    camera: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>`,
    gift: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>`,
    rings: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="8" cy="12" r="6"/><circle cx="16" cy="12" r="6"/></svg>`
};

const PALETAS = {
    1: { bg1:'#FFFFFF', bg2:'#F7F3EF', accent:'#C9A98C', title:'#2E2822', text:'#8C7B6E' },
    2: { bg1:'#FDF8F8', bg2:'#F2E4E4', accent:'#A67C7C', title:'#4A3B3B', text:'#635151' }
};

const pal = PALETAS[CONFIG.paletaElegida] || PALETAS[1];
const r = document.documentElement.style;
r.setProperty('--bg-1', pal.bg1); r.setProperty('--bg-2', pal.bg2);
r.setProperty('--accent', pal.accent); r.setProperty('--title-color', pal.title);
r.setProperty('--text-color', pal.text);

const fConfig = {
    A: { serif:'Cormorant Garamond', sans:'Jost', gf:'Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@300;400' },
    B: { serif:'Playfair Display', sans:'Lato', gf:'Playfair+Display:ital,wght@0,400;1,400&family=Lato:wght@300;400' }
};
const selF = fConfig[CONFIG.global.fuente] || fConfig.A;
document.getElementById('font-link').href = `https://fonts.googleapis.com/css2?family=${selF.gf}&display=swap`;
r.setProperty('--title-font', `'${selF.serif}', serif`);
r.setProperty('--body-font', `'${selF.sans}', sans-serif`);

document.getElementById('t-eyebrow').textContent = CONFIG.global.frasePortada;
document.getElementById('t-names').innerHTML = CONFIG.global.nombres.replace('&', '<em>&</em>');
document.getElementById('t-cover-date').textContent = CONFIG.global.fechaPortada;
document.getElementById('cover-bg').style.backgroundImage = `url('${CONFIG.global.fotoPortada}')`;

const main = document.getElementById('main-content');
const render = (id, icon, title, body) => {
    main.innerHTML += `<section class="section-wrapper" id="${id}"><div class="container"><div class="icon-wrapper">${ICONOS[icon]}</div><h2>${title}</h2>${body}</div></section>`;
};

// 1. Historia
render('historia', 'heart', 'Nuestra <em>Historia</em>', `<p>En un mundo lleno de coincidencias, encontrarnos fue nuestro momento favorito.</p>`);

// 2. Cuenta Regresiva
render('cuenta', 'calendar', 'Falta <em>Muy</em> Poco', `<div class="countdown-grid"><div class="cd-item"><span class="cd-num" id="days">00</span><span class="cd-lab">Días</span></div><div class="cd-item"><span class="cd-num" id="hours">00</span><span class="cd-lab">Horas</span></div><div class="cd-item"><span class="cd-num" id="mins">00</span><span class="cd-lab">Mins</span></div><div class="cd-item"><span class="cd-num" id="secs">00</span><span class="cd-lab">Segs</span></div></div>`);

// 3. Ubicación
const ev = CONFIG.eventos;
render('ubicacion', 'map', 'Cuándo <em>&</em> Dónde', `
    <div class="event-box"><h3 class="event-title">${ev.ceremonia.titulo}</h3><p class="event-info"><strong>Fecha</strong> ${ev.ceremonia.fecha}</p><p class="event-info"><strong>Hora</strong> ${ev.ceremonia.hora}</p><p class="event-info"><strong>Lugar</strong> ${ev.ceremonia.lugar}</p><p class="event-info">${ev.ceremonia.direccion}</p><a href="${ev.ceremonia.linkMapa}" class="btn">Ver Mapa</a></div>
    <div class="event-box"><h3 class="event-title">${ev.fiesta.titulo}</h3><p class="event-info"><strong>Fecha</strong> ${ev.fiesta.fecha}</p><p class="event-info"><strong>Hora</strong> ${ev.fiesta.hora}</p><p class="event-info"><strong>Lugar</strong> ${ev.fiesta.lugar}</p><p class="event-info">${ev.fiesta.direccion}</p><a href="${ev.fiesta.linkMapa}" class="btn">Ver Mapa</a></div>
`);

// 4. Galería
let fHTML = `<div class="gallery-grid">`;
CONFIG.fotosGaleria.forEach(f => fHTML += `<div class="gallery-item" onclick="openLightbox('${f}')"><img src="${f}"></div>`);
render('galeria', 'camera', 'Nuestros <em>Momentos</em>', fHTML + `</div>`);

// 5. RSVP (Intercambiado)
const rsvp = CONFIG.rsvp;
render('rsvp', 'rings', rsvp.titulo, `<p>${rsvp.texto}</p><a href="https://wa.me/${rsvp.whatsapp}?text=${encodeURIComponent(rsvp.mensaje)}" class="btn btn-wa">Confirmar Asistencia</a>`);

// 6. Regalos (Intercambiado - Ahora es el último)
const reg = CONFIG.regalos;
render('regalos', 'gift', reg.titulo, `<p>${reg.texto}</p><button class="btn" onclick="openGiftModal()">Ver Datos Bancarios</button>`);

// Cierre (Fuera de las secciones con fondo alternado)
document.getElementById('final-text-container').innerHTML = `<div class="final-message">${CONFIG.cierre.mensaje}</div><p>${CONFIG.cierre.subtexto}</p>`;
document.getElementById('ornament-container').innerHTML = ORNAMENTOS[CONFIG.cierre.tipoOrnamento];

// --- FUNCIONALIDADES ---
function openLightbox(s) { document.getElementById('lightbox').querySelector('img').src = s; document.getElementById('lightbox').style.display = 'flex'; history.pushState({lb:true}, ""); }
function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; if(history.state?.lb) history.back(); }
function openGiftModal() { 
    const r = CONFIG.regalos;
    document.getElementById('bank-details').innerHTML = `<p><strong>${r.banco}</strong></p><p>Titular: ${r.titular}</p><p>${r.cuenta}</p><p>${r.ci}</p>`;
    document.getElementById('gift-modal').style.display = 'flex'; 
    history.pushState({mo:true}, ""); 
}
function closeGiftModal() { document.getElementById('gift-modal').style.display = 'none'; if(history.state?.mo) history.back(); }

window.onpopstate = () => { document.getElementById('lightbox').style.display = 'none'; document.getElementById('gift-modal').style.display = 'none'; };

function updateCountdown() {
    const t = CONFIG.global.fechaCuentaRegresiva - new Date();
    if (t < 0) return;
    document.getElementById('days').innerText = Math.floor(t / 86400000);
    document.getElementById('hours').innerText = Math.floor((t / 3600000) % 24);
    document.getElementById('mins').innerText = Math.floor((t / 60000) % 60);
    document.getElementById('secs').innerText = Math.floor((t / 1000) % 60);
}
setInterval(updateCountdown, 1000);

const obs = new IntersectionObserver(entries => { entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }); }, { threshold: 0.1 });
document.querySelectorAll('.section-wrapper').forEach(sw => obs.observe(sw));
</script>
</body>
</html>
