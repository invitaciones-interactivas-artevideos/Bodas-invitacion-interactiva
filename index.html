<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Digital Premium</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link id="font-link" href="" rel="stylesheet">

<style>
/* ── VARIABLES DE DISEÑO ── */
:root {
  --bg-1: #ffffff;
  --bg-2: #F4EEEE; /* Color rosado suave para diferenciar secciones */
  --accent: #D4A5A5; 
  --title-color: #4A3B3B;
  --text-color: #8A7575;
  --title-font: 'Cormorant Garamond', serif;
  --body-font: 'Jost', sans-serif;
}

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { 
    background-color: var(--bg-1); color: var(--text-color); 
    font-family: var(--body-font); line-height: 1.6; text-align: center;
}

/* ── PORTADA & FLECHA ── */
#cover {
  position: relative; height: 100vh; display: flex; 
  align-items: center; justify-content: center; overflow: hidden; color: white;
}
#cover-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: 2s transform; }
#cover-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); }
#cover-content { position: relative; z-index: 2; padding: 20px; }
#cover h1 { font-family: var(--title-font); font-size: clamp(2.8rem, 10vw, 5rem); font-weight: 300; line-height: 1; }

.scroll-arrow {
    position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
    width: 35px; height: 35px; color: white; z-index: 10;
    animation: bounce 2s infinite; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
}
@keyframes bounce { 0%, 100% { transform: translate(-50%, 0); opacity: 0.4; } 50% { transform: translate(-50%, 15px); opacity: 1; } }

/* ── SECCIONES (Alternancia de color) ── */
.section-wrapper { padding: 6rem 1.5rem; opacity: 0; transform: translateY(30px); transition: 1.2s all ease-out; }
.section-wrapper.visible { opacity: 1; transform: translateY(0); }

.section-wrapper:nth-child(odd) { background-color: var(--bg-1); }
.section-wrapper:nth-child(even) { background-color: var(--bg-2); }

h2 { font-family: var(--title-font); color: var(--title-color); margin-bottom: 1.5rem; line-height: 1.1; }

/* ── CUENTA REGRESIVA (Cuadros 3D) ── */
.countdown-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; max-width: 450px; margin: 2.5rem auto;
}
.cd-item {
    background: white; padding: 15px 5px; border-radius: 18px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05), inset 0 -4px 0 rgba(0,0,0,0.05);
}
.cd-num { display: block; font-family: var(--title-font); font-size: 2.2rem; color: var(--accent); font-weight: bold; line-height: 1; }
.cd-lab { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; display: block; }

/* ── BOTONES ESTILO BURBUJA 3D ── */
.btn {
    display: inline-block; padding: 1.1rem 2.2rem; margin: 10px;
    background: linear-gradient(180deg, #FFFFFF 0%, #F0F0F0 100%);
    color: var(--title-color); border: none; border-radius: 50px;
    font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px;
    text-decoration: none; cursor: pointer; transition: 0.3s;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1), inset 0 -4px 6px rgba(0,0,0,0.05), inset 0 4px 6px white;
}
.btn-pink { background: linear-gradient(180deg, #F7D7D7 0%, #EBC2C2 100%); }
.btn:active { transform: translateY(3px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

/* ── ICONOS ANIMADOS ── */
.icon-wrapper { width: 55px; height: 55px; margin: 0 auto 1.5rem; color: var(--accent); }
.icon-wrapper svg { width: 100%; height: 100%; fill: none; stroke: currentColor; stroke-width: 1.2; stroke-dasharray: 100; stroke-dashoffset: 100; }
.visible .icon-wrapper svg { stroke-dashoffset: 0; animation: float 4s infinite ease-in-out; transition: 2.5s stroke-dashoffset; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

/* ── MODAL CRISTAL ── */
.modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
    display: none; align-items: center; justify-content: center; z-index: 4000; padding: 20px;
}
.modal-content {
    background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255,255,255,0.3);
    border-radius: 35px; width: 100%; max-width: 380px; padding: 2.5rem 1.5rem; color: white;
}
.bank-card { background: rgba(0,0,0,0.25); border-radius: 25px; padding: 1.2rem; margin: 1.5rem 0; border: 1px solid rgba(255,255,255,0.1); }
.bank-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
.bank-item:last-child { border-bottom: none; }
.bank-label { font-size: 0.65rem; text-transform: uppercase; opacity: 0.7; letter-spacing: 1px; display: block; }
.bank-value { font-size: 1.1rem; font-weight: 300; display: block; }

/* ── MÚSICA ── */
#music-btn {
    position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px;
    background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15); z-index: 5000; cursor: pointer; color: var(--accent);
}

@media (max-width: 600px) {
    .countdown-grid { gap: 8px; }
    h2 { font-size: 2.3rem; }
}
</style>
</head>
<body>

<!-- Botón Música -->
<div id="music-btn" onclick="toggleMusic()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
</div>
<audio id="bg-music" loop></audio>

<!-- Portada -->
<div id="cover">
    <div id="cover-bg"></div>
    <div id="cover-overlay"></div>
    <div id="cover-content">
        <span style="text-transform: uppercase; letter-spacing: 5px; font-size: 0.7rem; display: block; margin-bottom: 1.5rem;" id="t-eyebrow"></span>
        <h1 id="t-names"></h1>
        <p id="t-cover-date" style="letter-spacing: 3px; font-size: 0.85rem; margin-top: 1rem;"></p>
    </div>
    <div class="scroll-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
    </div>
</div>

<div id="main-content"></div>

<!-- SECCIÓN FINAL (CIERRE) -->
<section class="section-wrapper visible" style="background-color: var(--bg-1); padding-bottom: 8rem;">
    <div class="container">
        <h2 id="final-msg" style="font-size: 2.8rem; margin-bottom: 0.5rem;"></h2>
        <p id="final-sub" style="font-size: 1.1rem; opacity: 0.8;"></p>
        <div id="ornament" style="width:160px; margin: 3rem auto; color: var(--accent); opacity: 0.6;"></div>
    </div>
</section>

<!-- Modal Regalos -->
<div id="gift-modal" class="modal" onclick="if(event.target==this) closeGiftModal()">
    <div class="modal-content">
        <div style="font-size: 2.5rem; margin-bottom: 10px;">🎁</div>
        <h2 style="color:white; font-size: 2rem; font-family: var(--body-font);">Regalo</h2>
        <p id="m-texto" style="font-size: 0.95rem; line-height: 1.4; margin-bottom: 1rem;"></p>
        <div class="bank-card">
            <div class="bank-item"><span class="bank-label">Titular</span><span class="bank-value" id="m-titular"></span></div>
            <div class="bank-item"><span class="bank-label">Banco</span><span class="bank-value" id="m-banco"></span></div>
            <div class="bank-item"><span class="bank-label">Cuenta / CBU</span><span class="bank-value" id="m-cuenta"></span></div>
            <div class="bank-item"><span class="bank-label">CI / DNI</span><span class="bank-value" id="m-ci"></span></div>
        </div>
        <button class="btn btn-pink" style="width: 100%;" onclick="copyAcc()">Copiar número de cuenta</button>
    </div>
</div>

<script>
/* ════════════════════════════════════════
   ★ CONFIGURACIÓN (EDITA AQUÍ)
═════════════════════════════════════════= */
const CONFIG = {
    tamanos: { tituloSeccion: "2.4rem" },
    global: {
        nombres: "Sofía & Martín",
        frasePortada: "¡Nos Casamos!",
        fechaPortada: "20 . 12 . 2026",
        fechaCuentaRegresiva: new Date(2026, 11, 20, 18, 0),
        fotoPortada: "cover.jpg",
        musica: "musica.mp3"
    },
    eventos: {
        ceremonia: { t: "Ceremonia", f: "Sábado 20 de Dic", h: "18:00 Hs", l: "Parroquia San José", d: "Calle de la Fe 123", m: "#" },
        fiesta: { t: "Fiesta", f: "Sábado 20 de Dic", h: "21:00 Hs", l: "Salón Jardines de Gala", d: "Av. Principal 456", m: "#" }
    },
    regalos: {
        texto: "El mejor regalo es tu presencia, pero si deseas colaborar con nuestros sueños:",
        titular: "Sofía y Martín",
        banco: "Santander",
        cuenta: "1234567890",
        ci: "1.234.567-8"
    },
    cierre: {
        mensaje: "¡Te esperamos!",
        subtexto: "Tu presencia es muy importante para nosotros.",
        tipo: "floral" // floral o minimal
    }
};

/* ════════════════════════════════════════
   SISTEMA INTERNO
═════════════════════════════════════════= */
const ICONOS = {
    heart: `<svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`,
    calendar: `<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`,
    map: `<svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
    rings: `<svg viewBox="0 0 24 24"><circle cx="8" cy="12" r="6"/><circle cx="16" cy="12" r="6"/></svg>`,
    gift: `<svg viewBox="0 0 24 24"><path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>`
};

const ORNAMENTOS = {
    floral: `<svg viewBox="0 0 100 40" fill="none" stroke="currentColor" stroke-width="0.5"><path d="M10 20 Q25 10 40 20 T70 20 T90 20"/><path d="M30 15 Q35 5 40 15"/><path d="M60 15 Q65 5 70 15"/><circle cx="50" cy="20" r="1.5"/></svg>`,
    minimal: `<svg viewBox="0 0 100 20" stroke="currentColor" stroke-width="0.5"><line x1="0" y1="10" x2="40" y2="10"/><circle cx="50" cy="10" r="2" fill="none"/><line x1="60" y1="10" x2="100" y2="10"/></svg>`
};

document.getElementById('cover-bg').style.backgroundImage = `url('${CONFIG.global.fotoPortada}')`;
document.getElementById('t-names').innerHTML = CONFIG.global.nombres.replace('&', '<em>&</em>');
document.getElementById('t-eyebrow').innerText = CONFIG.global.frasePortada;
document.getElementById('t-cover-date').innerText = CONFIG.global.fechaPortada;
document.getElementById('bg-music').src = CONFIG.global.musica;

const main = document.getElementById('main-content');
const addSec = (id, icon, title, body) => {
    main.innerHTML += `<section class="section-wrapper" id="${id}"><div class="container"><div class="icon-wrapper">${ICONOS[icon]}</div><h2 style="font-size:${CONFIG.tamanos.tituloSeccion}">${title}</h2>${body}</div></section>`;
};

addSec('historia', 'heart', 'Nuestra Historia', '<p>En un mundo lleno de coincidencias, encontrarnos fue nuestro momento favorito.</p>');
addSec('cuenta', 'calendar', 'Falta Poco', `<div class="countdown-grid"><div class="cd-item"><span class="cd-num" id="days">00</span><span class="cd-lab">Días</span></div><div class="cd-item"><span class="cd-num" id="hours">00</span><span class="cd-lab">Hs</span></div><div class="cd-item"><span class="cd-num" id="mins">00</span><span class="cd-lab">Min</span></div><div class="cd-item"><span class="cd-num" id="secs">00</span><span class="cd-lab">Seg</span></div></div>`);
addSec('ubicacion', 'map', 'Dónde & Cuándo', `<div><h3>${CONFIG.eventos.ceremonia.t}</h3><p>${CONFIG.eventos.ceremonia.f} - ${CONFIG.eventos.ceremonia.h}<br>${CONFIG.eventos.ceremonia.l}<br>${CONFIG.eventos.ceremonia.d}</p><a href="${CONFIG.eventos.ceremonia.m}" class="btn">Ver Mapa</a></div><div style="margin-top:3rem"><h3>${CONFIG.eventos.fiesta.t}</h3><p>${CONFIG.eventos.fiesta.f} - ${CONFIG.eventos.fiesta.h}<br>${CONFIG.eventos.fiesta.l}<br>${CONFIG.eventos.fiesta.d}</p><a href="${CONFIG.eventos.fiesta.m}" class="btn">Ver Mapa</a></div>`);
addSec('rsvp', 'rings', 'Confirmación', `<p>Por favor, confirma tu asistencia.</p><a href="#" class="btn btn-pink">Confirmar por WhatsApp</a>`);
addSec('regalos', 'gift', 'Mesa de Regalos', `<p>Si deseas hacernos un presente...</p><button class="btn" onclick="openGiftModal()">Ver Datos Bancarios</button>`);

// Render Cierre Final
document.getElementById('final-msg').innerText = CONFIG.cierre.mensaje;
document.getElementById('final-sub').innerText = CONFIG.cierre.subtexto;
document.getElementById('ornament').innerHTML = ORNAMENTOS[CONFIG.cierre.tipo];

function toggleMusic() { const a = document.getElementById('bg-music'); a.paused ? a.play() : a.pause(); }
function openGiftModal() {
    const r = CONFIG.regalos;
    document.getElementById('m-texto').innerText = r.texto;
    document.getElementById('m-titular').innerText = r.titular;
    document.getElementById('m-banco').innerText = r.banco;
    document.getElementById('m-cuenta').innerText = r.cuenta;
    document.getElementById('m-ci').innerText = r.ci;
    document.getElementById('gift-modal').style.display = 'flex';
    history.pushState({modal:1}, "");
}
function closeGiftModal() { document.getElementById('gift-modal').style.display = 'none'; }
function copyAcc() { navigator.clipboard.writeText(CONFIG.regalos.cuenta); alert("Copiado!"); }

window.onpopstate = () => closeGiftModal();

function updateCD() {
    const t = CONFIG.global.fechaCuentaRegresiva - new Date();
    if(t<0) return;
    document.getElementById('days').innerText = Math.floor(t/86400000);
    document.getElementById('hours').innerText = Math.floor((t/3600000)%24);
    document.getElementById('mins').innerText = Math.floor((t/60000)%60);
    document.getElementById('secs').innerText = Math.floor((t/1000)%60);
}
setInterval(updateCD, 1000);

const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }), {threshold:0.1});
document.querySelectorAll('.section-wrapper').forEach(s => obs.observe(s));
</script>
</body>
</html>
